<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Özel Şarkılar 🎵</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }
        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            color: #1db954; /* Spotify yeşili tonlarında şık bir renk */
        }
        .playlist {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .playlist li {
            background: #282828;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }
        .playlist li:hover {
            background: #383838;
        }
        .song-name {
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .download-btn {
            background: #1db954;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .download-btn:hover {
            transform: scale(1.05);
            background: #1ed760;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Senin İçin Seçtiğim Şarkılar 🎧</h2>
    <ul class="playlist">
        <li>
            <span class="song-name">Motive - Belly Dance</span>
            <a href="sarki1.mp3" download="Motive - Belly Dance" class="download-btn">İndir</a>
        </li>
        <li>
            <span class="song-name">Belly Dance Gitar</span>
            <a href="sarki2.mp3" download="Belly Dance Gitar" class="download-btn">İndir</a>
        </li>
        <li>
            <span class="song-name">Mandalina</span>
            <a href="mandalina.mp3" download="Mandalina" class="download-btn">İndir</a>
        </li>
    </ul>
</div>

</body>
</html>
